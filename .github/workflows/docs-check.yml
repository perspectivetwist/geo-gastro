name: Documentation Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check DEVELOPER.md exists and was updated
        run: |
          if [ ! -f "DEVELOPER.md" ]; then
            echo "DEVELOPER.md fehlt!"
            exit 1
          fi
          echo "DEVELOPER.md vorhanden"

      - name: Check docs/solutions directory exists
        run: |
          if [ ! -d "docs/solutions" ]; then
            echo "docs/solutions/ fehlt!"
            exit 1
          fi
          echo "docs/solutions/ vorhanden"

      - name: Check CLAUDE.md exists
        run: |
          if [ ! -f "CLAUDE.md" ]; then
            echo "CLAUDE.md fehlt!"
            exit 1
          fi
          echo "CLAUDE.md vorhanden"

      - name: Check SECURITY.md exists
        run: |
          if [ ! -f "SECURITY.md" ]; then
            echo "SECURITY.md fehlt!"
            exit 1
          fi
          echo "SECURITY.md vorhanden"

      - name: No API keys in source code
        run: |
          if grep -r "sk-ant\|jina_\|ntn_" src/ app/ lib/ 2>/dev/null; then
            echo "API Key im Code gefunden!"
            exit 1
          fi
          echo "Kein API Key im Code"

      - name: Summary
        run: |
          echo "Doku-Check bestanden"
          echo "DEVELOPER.md: $(wc -l < DEVELOPER.md) Zeilen"
          echo "docs/solutions/: $(find docs/solutions -name '*.md' 2>/dev/null | wc -l) Dateien"
